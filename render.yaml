services:
  - type: web
    name: face-recognition-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: face-recognition-db
          property: connectionString
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: pawantripathi802@gmail.com
      - key: EMAIL_HOST_PASSWORD
        value: kplopuunmezfesie
      - key: DEFAULT_FROM_EMAIL
        value: "Face Recognition System <pawantripathi802@gmail.com>"
    # No disk needed — all photos and model stored in PostgreSQL

databases:
  - name: face-recognition-db
    plan: free

services:
  - type: web
    name: face-recognition-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: face-recognition-db    # Must match the database name below
          property: connectionString
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
    disk:
      name: media-storage
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: face-recognition-db
    plan: free
